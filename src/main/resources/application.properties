######################## SETUP application.properties ########################

## General setup
server.port = 8080
vaadin.launch-browser = true

spring.config.import=optional:file:./.env.properties


## Terminal setup - text color, formating, disable logging... 
spring.output.ansi.enabled = always  
logging.pattern.console = %cyan(%d{HH:mm:ss}) [%green(%level)]  %cyan(%msg%n)
logging.level.root = WARN

## Files Uploading setup
spring.servlet.multipart.enabled = true
spring.servlet.multipart.max-file-size = 16GB
spring.servlet.multipart.max-request-size = 16GB

## MongoDB setup connection
spring.data.mongodb.uri=${MONGO_CONNECTION_STRING}

## cookies settings
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

## google sign in
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

#############################################################################
